services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  gotrue:
    image: supabase/gotrue:v2.189.0
    ports:
      - "9999:9999"
    environment:
      GOTRUE_DATABASE_URL: "postgres://supabase_auth_admin:${AUTH_ADMIN_PASSWORD}@postgres:5432/grind?options=-c%20search_path%3Dauth"
      DATABASE_URL: "postgres://supabase_auth_admin:${AUTH_ADMIN_PASSWORD}@postgres:5432/grind?options=-c%20search_path%3Dauth"
      GOTRUE_DB_DRIVER: "postgres"
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_JWT_AUD: "authenticated"
      GOTRUE_SITE_URL: "${VITE_SITE_URL}"
      GOTRUE_LOG_LEVEL: "info"
      GOTRUE_API_HOST: "0.0.0.0"
      PORT: 9999
      API_EXTERNAL_URL: "${VITE_GOTRUE_URL}"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_DB_SCHEMA: "auth"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: "${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID}"
      GOTRUE_EXTERNAL_GOOGLE_SECRET: "${GOTRUE_EXTERNAL_GOOGLE_SECRET}"
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "${VITE_GOTRUE_URL}/callback"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgrest:
    image: postgrest/postgrest:v14.12
    ports:
      - "3000:3000"
    environment:
      PGRST_SERVER_HOST: "0.0.0.0"
      PGRST_DB_URI: "postgres://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/grind"
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  trigger-setup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts/setup-trigger.sh:/setup-trigger.sh
    entrypoint: ["sh", "/setup-trigger.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_started
    restart: "no"

  adminer:
    image: adminer:5.3.0
    container_name: adminer
    ports:
      - "8040:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-db
      ADMINER_DEFAULT_USER: postgres
      ADMINER_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
    name: postgres_data
    driver: local
